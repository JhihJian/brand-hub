<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未找到 - 节物</title>
  <link rel="stylesheet" href="css/fonts.css">
  <style>
    :root {
      --paper: #faf8f5;
      --ink-wash: #f0ede8;
      --ink-light: #c4c0b8;
      --ink-mid: #7a766e;
      --ink-deep: #45423d;
      --ink-full: #2a2825;
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 32px;
      --space-lg: 56px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: 'LXGW WenKai', 'Kaiti SC', 'STKaiti', serif;
      background: var(--paper);
      color: var(--ink-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
    }

    .error-container {
      max-width: 640px;
      width: 100%;
      text-align: center;
      animation: fadeUp 1s ease;
    }

    .error-code {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.4em;
      color: var(--ink-light);
      margin-bottom: var(--space-lg);
      text-transform: uppercase;
    }

    .error-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
    }

    .error-divider-line {
      width: 24px;
      height: 1px;
      background: var(--ink-wash);
    }

    .error-divider-dot {
      width: 4px;
      height: 4px;
      background: var(--ink-light);
    }

    .error-poem {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.5em;
      color: var(--ink-full);
      margin-bottom: var(--space-md);
      line-height: 2;
    }

    .error-message {
      font-size: 15px;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 2.4;
      letter-spacing: 0.08em;
      max-width: 420px;
      margin: 0 auto var(--space-lg);
    }

    .error-action {
      margin-top: var(--space-lg);
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      font-family: 'LXGW WenKai', 'Kaiti SC', 'STKaiti', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--ink-deep);
      border: 1px solid var(--ink-wash);
      border-radius: 2px;
      background: transparent;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn:hover {
      border-color: var(--ink-mid);
      background: rgba(255, 255, 255, 0.5);
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-sm) var(--space-md);
      border-top: 1px solid var(--ink-wash);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--ink-mid);
      letter-spacing: 0.15em;
      background: var(--paper);
    }

    .footer-brand {
      font-weight: 400;
      letter-spacing: 0.25em;
    }

    .footer-season {
      color: var(--ink-light);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 430px) {
      body {
        padding: var(--space-sm);
      }

      .error-poem {
        font-size: 22px;
        letter-spacing: 0.3em;
      }

      .error-message {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404 Not Found</div>

    <div class="error-divider">
      <span class="error-divider-line"></span>
      <span class="error-divider-dot"></span>
      <span class="error-divider-line"></span>
    </div>

    <h1 class="error-poem">偏我来时不逢春</h1>

    <p class="error-message">
      寻访之处，已无踪迹。<br>
      春风不解，归去何方。
    </p>

    <div class="error-action">
      <a href="/" class="btn">返回首页</a>
    </div>
  </div>

  <footer class="footer">
    <span class="footer-brand">节物</span>
    <span class="footer-season">乙巳年 · 雨水</span>
  </footer>
</body>
</html>
