<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 节物</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
    }
    .login-tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      cursor: pointer;
      color: #666;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-size: 15px;
    }
    .login-tab:hover {
      color: #333;
    }
    .login-tab.active {
      color: #007bff;
      border-bottom-color: #007bff;
    }
    .login-form-container {
      display: none;
    }
    .login-form-container.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-brand">节物</div>
    </header>

    <main>
      <div id="message" class="message hidden"></div>

      <div class="login-tabs">
        <button type="button" class="login-tab active" data-mode="password">密码登录</button>
        <button type="button" class="login-tab" data-mode="sms">短信登录</button>
      </div>

      <!-- Password Login Form -->
      <div class="login-form-container active" id="passwordForm">
        <form id="pwdLoginForm">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="pwdPhone" placeholder="请输入手机号" required>
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="pwdPassword" placeholder="请输入密码" required>
          </div>

          <div class="form-group">
            <button type="submit" class="btn btn-primary">登 录</button>
          </div>
        </form>
      </div>

      <!-- SMS Login Form -->
      <div class="login-form-container" id="smsForm">
        <form id="smsLoginForm">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="smsPhone" placeholder="请输入手机号" required>
          </div>

          <div class="form-group">
            <label class="form-label">验证码</label>
            <div class="form-row">
              <input type="text" class="form-input" id="code" placeholder="6位验证码" maxlength="6" required>
              <button type="button" class="btn btn-small" id="sendCodeBtn">获取验证码</button>
            </div>
          </div>

          <div class="form-group">
            <button type="submit" class="btn btn-primary">登 录</button>
          </div>
        </form>
      </div>

      <div class="link">
        没有账号？<a href="register.html">前往注册</a>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function() {
      const messageEl = document.getElementById('message');
      const tabs = document.querySelectorAll('.login-tab');
      const passwordFormContainer = document.getElementById('passwordForm');
      const smsFormContainer = document.getElementById('smsForm');

      // Password form elements
      const pwdLoginForm = document.getElementById('pwdLoginForm');
      const pwdPhoneInput = document.getElementById('pwdPhone');
      const pwdPasswordInput = document.getElementById('pwdPassword');

      // SMS form elements
      const smsLoginForm = document.getElementById('smsLoginForm');
      const smsPhoneInput = document.getElementById('smsPhone');
      const codeInput = document.getElementById('code');
      const sendCodeBtn = document.getElementById('sendCodeBtn');

      let countdown = 0;

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message message-' + type;
        messageEl.classList.remove('hidden');
      }

      function hideMessage() {
        messageEl.classList.add('hidden');
      }

      // Tab switching
      tabs.forEach(tab => {
        tab.addEventListener('click', function() {
          tabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');

          const mode = this.dataset.mode;
          if (mode === 'password') {
            passwordFormContainer.classList.add('active');
            smsFormContainer.classList.remove('active');
          } else {
            passwordFormContainer.classList.remove('active');
            smsFormContainer.classList.add('active');
          }
          hideMessage();
        });
      });

      // Password login
      pwdLoginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideMessage();

        const phone = pwdPhoneInput.value.trim();
        const password = pwdPasswordInput.value;

        if (!phone || !password) {
          showMessage('请填写完整信息', 'error');
          return;
        }

        try {
          const result = await api.loginPassword(phone, password);
          window.location.href = 'profile.html';
        } catch (error) {
          showMessage(error.message || '登录失败', 'error');
        }
      });

      // SMS countdown
      function startCountdown(seconds) {
        countdown = seconds;
        sendCodeBtn.disabled = true;
        sendCodeBtn.textContent = countdown + 's';

        const timer = setInterval(function() {
          countdown--;
          if (countdown <= 0) {
            clearInterval(timer);
            sendCodeBtn.disabled = false;
            sendCodeBtn.textContent = '获取验证码';
          } else {
            sendCodeBtn.textContent = countdown + 's';
          }
        }, 1000);
      }

      // Send SMS code
      sendCodeBtn.addEventListener('click', async function() {
        const phone = smsPhoneInput.value.trim();

        if (!phone) {
          showMessage('请输入手机号', 'error');
          return;
        }

        hideMessage();

        try {
          const result = await api.sendSmsCode(phone, 'login');
          startCountdown(result.cooldown || 60);
          showMessage('验证码已发送', 'success');
        } catch (error) {
          showMessage(error.message || '发送失败', 'error');
        }
      });

      // SMS login
      smsLoginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideMessage();

        const phone = smsPhoneInput.value.trim();
        const code = codeInput.value.trim();

        if (!phone || !code) {
          showMessage('请填写完整信息', 'error');
          return;
        }

        try {
          const result = await api.login(phone, code);
          window.location.href = 'profile.html';
        } catch (error) {
          showMessage(error.message || '登录失败', 'error');
        }
      });

      // Redirect if already logged in
      if (api.getRefreshToken()) {
        window.location.href = 'profile.html';
      }
    })();
  </script>
</body>
</html>
